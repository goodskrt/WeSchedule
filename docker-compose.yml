services:
  db:
    image: mysql:8.0
    container_name: weschedule-db
    restart: always
    environment:
      MYSQL_DATABASE: weschedule
      MYSQL_USER: weschedule
      MYSQL_PASSWORD: WeSchedule@2024
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - weschedule-db-data:/var/lib/mysql

  app:
    build: .
    container_name: weschedule-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/weschedule?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - DB_USERNAME=weschedule
      - DB_PASSWORD=WeSchedule@2024
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - APP_BASE_URL=http://localhost:8080
    env_file:
      - .env

volumes:
  weschedule-db-data:
