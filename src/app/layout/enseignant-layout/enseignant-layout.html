<!-- Layout Enseignant -->
<div class="enseignant-layout flex h-screen bg-gray-100">
  <!-- Overlay pour mobile -->
  <div 
    class="sidebar-overlay lg:hidden"
    [class.active]="!sidebarCollapsed() && sidebarMode() === 'overlay'"
    (click)="closeSidebar()">
  </div>

  <!-- Sidebar Enseignant -->
  <app-sidebar-enseignant 
    [collapsed]="sidebarCollapsed()"
    [mode]="sidebarMode()"
    (toggleSidebar)="onSidebarToggle($event)">
  </app-sidebar-enseignant>

  <!-- Contenu principal -->
  <div 
    class="main-content flex-1 flex flex-col overflow-hidden sidebar-transition"
    [class.sidebar-collapsed]="sidebarCollapsed()">
    
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Zone de contenu -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
