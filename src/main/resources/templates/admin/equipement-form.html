<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'creation'} ? 'Nouvel équipement - WeSchedule' : 'Modifier équipement - WeSchedule'">Équipement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
    <style>
        .form-card { background: var(--white); border-radius: var(--radius-xl); border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm); padding: 1.75rem; }
        .form-section-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--gray-400); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-100); }
        .form-control, .form-select { border-radius: var(--radius-md); border: 1.5px solid var(--gray-200); }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: admin-sidebar('equipements')}"></div>
    <div class="ws-wrapper">
        <div th:replace="~{fragments/header :: admin-header}"></div>
        <main class="ws-main-content">

            <nav aria-label="breadcrumb" class="mb-2">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="/admin/equipements">Équipements</a></li>
                    <li class="breadcrumb-item active" th:text="${mode == 'creation'} ? 'Nouveau' : 'Modifier'"></li>
                </ol>
            </nav>
            <h2 class="page-title" th:text="${mode == 'creation'} ? 'Nouvel équipement' : 'Modifier l\'équipement'"></h2>
            <p class="page-subtitle" th:text="${mode == 'creation'} ? 'Enregistrez un poste ou un périphérique' : 'Mettez à jour les informations'"></p>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form class="form-card mt-3" method="post"
                  th:action="${mode == 'creation'} ? @{/admin/equipements/creer} : @{/admin/equipements/modifier/{id}(id=${equipement.id})}">
                <p class="form-section-title">Identification</p>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="nom" required
                               th:value="${equipement.nom}" placeholder="Ex. Vidéoprojecteur salle 201">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">N° de série <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="numeroSerie" required
                               th:value="${equipement.numeroSerie}" placeholder="Identifiant unique du matériel">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Type d'équipement</label>
                        <select class="form-select" name="typeEquipementId">
                            <option value="">— Non renseigné —</option>
                            <option th:each="t : ${types}" th:value="${t.id}"
                                    th:selected="${equipement.typeEquipement != null and equipement.typeEquipement.id == t.id}"
                                    th:text="${t.nom + ' (' + (t.categorie != null ? t.categorie.nom : '') + ')'}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <p class="text-muted small mb-0">
                            <i class="fas fa-info-circle me-1"></i>
                            Si une <strong>salle</strong> est renseignée, le statut est automatiquement mis à <strong>EN_SERVICE</strong>.
                        </p>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Statut</label>
                        <select class="form-select" name="statut">
                            <option th:each="st : ${statuts}" th:value="${st.name()}"
                                    th:selected="${equipement.statut != null and equipement.statut == st}"
                                    th:text="${st.name()}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Salle</label>
                        <select class="form-select" name="salleId">
                            <option value="">— Non affecté —</option>
                            <option th:each="s : ${salles}" th:value="${s.idSalle}"
                                    th:selected="${equipement.salle != null and equipement.salle.idSalle == s.idSalle}"
                                    th:text="${s.nomSalle}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Photo (URL)</label>
                        <input type="text" class="form-control" name="photo"
                               th:value="${equipement.photo}" placeholder="https://…">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Notes, caractéristiques…"
                                  th:text="${equipement.description}"></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                    <a href="/admin/equipements" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>
                        <span th:text="${mode == 'creation'} ? 'Créer' : 'Enregistrer'"></span>
                    </button>
                </div>
            </form>
            <p class="text-muted small mt-3">
                <a href="/admin/equipements/types"><i class="fas fa-tags me-1"></i>Gérer les types d'équipements</a>
            </p>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modern-layout.js"></script>
</body>
</html>
