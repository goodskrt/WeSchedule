<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'edition'} ? 'Modifier étudiant' : 'Nouvel étudiant'">Étudiant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: admin-sidebar('etudiants')}"></div>
    <div class="ws-wrapper">
        <div th:replace="~{fragments/header :: admin-header}"></div>
        <main class="ws-main-content">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="/admin/etudiants">Étudiants</a></li>
                    <li class="breadcrumb-item active" th:text="${mode == 'edition'} ? 'Modification' : 'Création'">Formulaire</li>
                </ol>
            </nav>

            <h2 class="page-title mb-3" th:text="${mode == 'edition'} ? 'Modifier l\'étudiant' : 'Nouvel étudiant'">Étudiant</h2>

            <div class="card border-0 shadow-sm" style="border-radius: var(--radius-xl); max-width: 640px;">
                <div class="card-body p-4">
                    <form th:action="${mode == 'edition'} ? @{/admin/etudiants/modifier/{id}(id=${etudiant.idEtudiant})} : @{/admin/etudiants/creer}"
                          method="post" class="needs-validation">

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="nom" required th:value="${etudiant.nom}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Prénom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="prenom" required th:value="${etudiant.prenom}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Numéro étudiant</label>
                            <input type="text" class="form-control" name="numeroEtudiant" placeholder="Matricule interne (optionnel)"
                                   th:value="${etudiant.numeroEtudiant}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email (contact uniquement)</label>
                            <input type="email" class="form-control" name="email" placeholder="optionnel"
                                   th:value="${etudiant.email}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Téléphone</label>
                            <input type="text" class="form-control" name="telephone" th:value="${etudiant.telephone}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date de naissance</label>
                            <input type="date" class="form-control" name="dateNaissance"
                                   th:value="${etudiant.dateNaissance}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Classe</label>
                            <select class="form-select" name="classeId">
                                <option value="">— Aucune —</option>
                                <option th:each="c : ${classes}"
                                        th:value="${c.idClasse}"
                                        th:selected="${etudiant.classe != null && etudiant.classe.idClasse == c.idClasse}"
                                        th:text="${c.nom}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Groupe</label>
                            <select class="form-select" name="groupeId">
                                <option value="">— Aucun —</option>
                                <option th:each="g : ${groupes}"
                                        th:value="${g.idGroupe}"
                                        th:selected="${etudiant.groupe != null && etudiant.groupe.idGroupe == g.idGroupe}"
                                        th:text="${g.nomGroupe}"></option>
                            </select>
                        </div>

                        <div class="alert alert-light border small mb-0">
                            <i class="fas fa-info-circle text-primary me-1"></i>
                            Les étudiants n'ont pas de compte de connexion dans cette application.
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>
                                <span th:text="${mode == 'edition'} ? 'Enregistrer' : 'Créer'">Enregistrer</span>
                            </button>
                            <a href="/admin/etudiants" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modern-layout.js"></script>
</body>
</html>
