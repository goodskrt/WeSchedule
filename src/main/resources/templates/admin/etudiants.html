<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étudiants - WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: admin-sidebar('etudiants')}"></div>
    <div class="ws-wrapper">
        <div th:replace="~{fragments/header :: admin-header}"></div>
        <main class="ws-main-content">

            <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
                <div>
                    <h2 class="page-title mb-1">Étudiants</h2>
                    <p class="page-subtitle mb-0">Fiches étudiants (sans compte applicatif).</p>
                </div>
                <a href="/admin/etudiants/nouveau" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i> Nouvel étudiant
                </a>
            </div>

            <div th:replace="~{fragments/admin-stats :: stat-row(${pageStats})}"></div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3">
                <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex align-items-end gap-3 mb-3 flex-wrap">
                <div>
                    <label class="small text-muted d-block mb-1">École</label>
                    <select id="filterEcole" class="form-select form-select-sm" style="min-width:220px;max-width:320px;"
                            onchange="document.getElementById('filterClasse').value=''; applyEtudiantFilters();">
                        <option value="">Toutes les écoles</option>
                        <option th:each="ec : ${ecoles}"
                                th:value="${ec.idEcole}"
                                th:selected="${ecoleFiltre != null && ecoleFiltre == ec.idEcole}"
                                th:text="${ec.nomEcole}"></option>
                    </select>
                </div>
                <div>
                    <label class="small text-muted d-block mb-1">Classe</label>
                    <select id="filterClasse" class="form-select form-select-sm" style="min-width:220px;max-width:320px;"
                            th:attr="disabled=${ecoleFiltre == null}"
                            onchange="applyEtudiantFilters();">
                        <option value="">Toutes les classes</option>
                        <option th:each="c : ${classesPourFiltre}"
                                th:value="${c.idClasse}"
                                th:selected="${classeFiltre != null && classeFiltre == c.idClasse}"
                                th:text="${c.nom}"></option>
                    </select>
                </div>
                <div class="small text-muted align-self-center" th:if="${ecoleFiltre == null}">
                    Choisissez une école pour filtrer par classe.
                </div>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius: var(--radius-xl);">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Nom</th>
                                    <th>Prénom</th>
                                    <th>N° étudiant</th>
                                    <th>Email</th>
                                    <th>École</th>
                                    <th>Classe</th>
                                    <th>Groupe</th>
                                    <th class="text-end pe-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${etudiants == null or etudiants.isEmpty()}">
                                    <td colspan="8" class="text-center text-muted py-5">Aucun étudiant pour ce filtre.</td>
                                </tr>
                                <tr th:each="e : ${etudiants}">
                                    <td class="ps-4 fw-semibold" th:text="${e.nom}">—</td>
                                    <td th:text="${e.prenom}">—</td>
                                    <td><code class="small" th:text="${e.numeroEtudiant != null ? e.numeroEtudiant : '—'}">—</code></td>
                                    <td class="small text-muted" th:text="${e.email != null ? e.email : '—'}">—</td>
                                    <td class="small"
                                        th:text="${e.classe != null and e.classe.ecole != null} ? ${e.classe.ecole.nomEcole} : '—'">—</td>
                                    <td>
                                        <span class="badge bg-secondary bg-opacity-10 text-secondary"
                                              th:if="${e.classe != null}" th:text="${e.classe.nom}">—</span>
                                        <span class="text-muted small" th:if="${e.classe == null}">—</span>
                                    </td>
                                    <td class="small"
                                        th:text="${e.groupe != null ? e.groupe.nomGroupe : '—'}">—</td>
                                    <td class="text-end pe-4">
                                        <a th:href="@{/admin/etudiants/modifier/{id}(id=${e.idEtudiant})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <form th:action="@{/admin/etudiants/supprimer/{id}(id=${e.idEtudiant})}" method="post" class="d-inline"
                                              onsubmit="return confirm('Supprimer cet étudiant ?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modern-layout.js"></script>
    <script>
        function applyEtudiantFilters() {
            const ecole = document.getElementById('filterEcole').value;
            const classe = document.getElementById('filterClasse').value;
            let q = '';
            if (ecole) q += 'ecoleId=' + encodeURIComponent(ecole);
            if (classe) q += (q ? '&' : '') + 'classeId=' + encodeURIComponent(classe);
            window.location.href = q ? '/admin/etudiants?' + q : '/admin/etudiants';
        }
    </script>
</body>
</html>
