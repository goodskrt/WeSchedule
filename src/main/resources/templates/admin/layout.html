<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - WeSchedule'">WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard-professional.css">
    <th:block th:replace="${customStyles}"></th:block>
</head>
<body>
    <!-- Navbar Moderne -->
    <nav class="navbar-modern">
        <div class="container-fluid">
            <div class="navbar-content">
                <!-- Logo et Brand -->
                <div class="navbar-brand-section">
                    <a class="brand-link" href="/dashboard/admin">
                        <div class="brand-logo">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <span class="brand-text">WeSchedule</span>
                    </a>
                </div>

                <!-- Message de bienvenue -->
                <div class="welcome-section">
                    <div class="welcome-message">
                        <div class="welcome-greeting">
                            <i class="fas fa-sun greeting-icon"></i>
                            <span class="greeting-text">Bienvenue,</span>
                        </div>
                        <div class="welcome-name" th:text="${nomComplet}">Administrateur</div>
                    </div>
                </div>

                <!-- User Menu -->
                <div class="user-menu-section">
                    <div class="dropdown">
                        <button class="user-menu-btn" type="button" data-bs-toggle="dropdown">
                            <div class="user-avatar">
                                <i class="fas fa-user-shield"></i>
                            </div>
                            <div class="user-info">
                                <div class="user-name" th:text="${nomComplet}">Admin</div>
                                <div class="user-role">Administrateur</div>
                            </div>
                            <i class="fas fa-chevron-down dropdown-icon"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end user-dropdown">
                            <li class="dropdown-header">
                                <div class="dropdown-user-info">
                                    <div class="dropdown-avatar">
                                        <i class="fas fa-user-shield"></i>
                                    </div>
                                    <div>
                                        <div class="dropdown-name" th:text="${nomComplet}">Admin</div>
                                        <div class="dropdown-email" th:text="${email}">admin@weschedule.com</div>
                                    </div>
                                </div>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" href="/profile">
                                    <i class="fas fa-user"></i>
                                    <span>Mon profil</span>
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="/dashboard/admin/parametres">
                                    <i class="fas fa-cog"></i>
                                    <span>Paramètres</span>
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" style="margin: 0;">
                                    <button type="submit" class="dropdown-item logout-item">
                                        <i class="fas fa-sign-out-alt"></i>
                                        <span>Déconnexion</span>
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-2 col-md-3 p-0">
                <div class="sidebar">
                    <div class="sidebar-menu">
                        <div class="menu-section-title">Tableau de bord</div>
                        <a href="/dashboard/admin" class="nav-link" th:classappend="${activePage == 'overview'} ? 'active' : ''">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Vue d'ensemble</span>
                        </a>
                        
                        <div class="menu-section-title">Gestion</div>
                        <a href="/dashboard/admin/enseignants" class="nav-link" th:classappend="${activePage == 'enseignants'} ? 'active' : ''">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <span>Enseignants</span>
                        </a>
                        <a href="/admin/salles" class="nav-link" th:classappend="${activePage == 'salles'} ? 'active' : ''">
                            <i class="fas fa-door-open"></i>
                            <span>Salles</span>
                        </a>
                        <a href="/admin/cours" class="nav-link" th:classappend="${activePage == 'cours'} ? 'active' : ''">
                            <i class="fas fa-book"></i>
                            <span>Cours</span>
                        </a>
                        <a href="/dashboard/admin/emplois" class="nav-link" th:classappend="${activePage == 'emplois'} ? 'active' : ''">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Emplois du temps</span>
                        </a>
                        
                        <div class="menu-section-title">Systeme</div>
                        <a href="/dashboard/admin/rapports" class="nav-link" th:classappend="${activePage == 'rapports'} ? 'active' : ''">
                            <i class="fas fa-chart-bar"></i>
                            <span>Rapports</span>
                        </a>
                        <a href="/dashboard/admin/parametres" class="nav-link" th:classappend="${activePage == 'parametres'} ? 'active' : ''">
                            <i class="fas fa-cog"></i>
                            <span>Parametres</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-10 col-md-9">
                <div class="main-content">
                    <th:block th:replace="${content}"></th:block>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:replace="${customScripts}"></th:block>
</body>
</html>
