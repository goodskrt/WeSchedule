<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - WeSchedule'">WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
    <th:block th:replace="${customStyles}"></th:block>
</head>
<body>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: admin-sidebar(${activePage})}"></div>

    <!-- Wrapper -->
    <div class="ws-wrapper">

        <!-- Header -->
        <div th:replace="~{fragments/header :: admin-header}"></div>

        <!-- Main Content -->
        <main class="ws-main-content">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>

    <script src="/js/modern-layout.js"></script>
    <th:block th:replace="${customScripts}"></th:block>
</body>
</html>
