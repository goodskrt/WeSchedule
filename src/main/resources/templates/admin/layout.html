<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - WeSchedule'">WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard-professional.css">
    <th:block th:replace="${customStyles}"></th:block>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard/admin">
                <img src="/images/logo.jpeg" alt="Logo">
                WeSchedule
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link p-0" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <div class="user-info-nav">
                                <div class="user-avatar-small">
                                    <i class="fas fa-user-shield"></i>
                                </div>
                                <div class="user-details">
                                    <div class="user-name-small" th:text="${nomComplet}">Admin</div>
                                    <div class="user-role-small">Administrateur</div>
                                </div>
                                <i class="fas fa-chevron-down" style="font-size: 0.8rem; color: var(--gray-400);"></i>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile"><i class="fas fa-user"></i> Mon profil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" style="margin: 0;">
                                    <button type="submit" class="dropdown-item">
                                        <i class="fas fa-sign-out-alt"></i> Deconnexion
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-2 col-md-3 p-0">
                <div class="sidebar">
                    <div class="sidebar-menu">
                        <div class="menu-section-title">Tableau de bord</div>
                        <a href="/dashboard/admin" class="nav-link" th:classappend="${activePage == 'overview'} ? 'active' : ''">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Vue d'ensemble</span>
                        </a>
                        
                        <div class="menu-section-title">Gestion</div>
                        <a href="/dashboard/admin/enseignants" class="nav-link" th:classappend="${activePage == 'enseignants'} ? 'active' : ''">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <span>Enseignants</span>
                        </a>
                        <a href="/dashboard/admin/salles" class="nav-link" th:classappend="${activePage == 'salles'} ? 'active' : ''">
                            <i class="fas fa-door-open"></i>
                            <span>Salles</span>
                        </a>
                        <a href="/dashboard/admin/cours" class="nav-link" th:classappend="${activePage == 'cours'} ? 'active' : ''">
                            <i class="fas fa-book"></i>
                            <span>Cours</span>
                        </a>
                        <a href="/dashboard/admin/emplois" class="nav-link" th:classappend="${activePage == 'emplois'} ? 'active' : ''">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Emplois du temps</span>
                        </a>
                        
                        <div class="menu-section-title">Systeme</div>
                        <a href="/dashboard/admin/rapports" class="nav-link" th:classappend="${activePage == 'rapports'} ? 'active' : ''">
                            <i class="fas fa-chart-bar"></i>
                            <span>Rapports</span>
                        </a>
                        <a href="/dashboard/admin/parametres" class="nav-link" th:classappend="${activePage == 'parametres'} ? 'active' : ''">
                            <i class="fas fa-cog"></i>
                            <span>Parametres</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-10 col-md-9">
                <div class="main-content">
                    <th:block th:replace="${content}"></th:block>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:replace="${customScripts}"></th:block>
</body>
</html>
