<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservations — WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
</head>
<body>
<div th:replace="~{fragments/sidebar :: admin-sidebar('reservations')}"></div>
<div class="ws-wrapper">
    <div th:replace="~{fragments/header :: admin-header}"></div>
    <main class="ws-main-content">
        <nav aria-label="breadcrumb" class="mb-2">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item active">Réservations de salles</li>
            </ol>
        </nav>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h5 class="card-title fw-bold mb-3"><i class="fas fa-inbox me-2 text-primary"></i>Demandes des enseignants</h5>
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Date demande</th>
                            <th>Enseignant</th>
                            <th>Salle</th>
                            <th>Créneau</th>
                            <th>Motif</th>
                            <th>Équipements</th>
                            <th>Statut</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${demandes == null or demandes.isEmpty()}">
                            <td colspan="8" class="text-muted text-center py-4">Aucune demande.</td>
                        </tr>
                        <tr th:each="d : ${demandes}">
                            <td class="small text-muted text-nowrap" th:text="${d.createdAt != null} ? ${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
                            <td class="small">
                                <span th:if="${d.enseignant != null}"
                                      th:text="${d.enseignant.prenom + ' ' + d.enseignant.nom}">—</span>
                                <div th:if="${d.enseignant != null}" class="text-muted" style="font-size:0.75rem;" th:text="${d.enseignant.email}"></div>
                            </td>
                            <td th:text="${d.salle != null} ? ${d.salle.nomSalle} : '—'">—</td>
                            <td class="small text-nowrap">
                                <span th:text="${#temporals.format(d.startAt, 'dd/MM HH:mm')}"></span>
                                <span class="text-muted">→</span>
                                <span th:text="${#temporals.format(d.endAt, 'dd/MM HH:mm')}"></span>
                            </td>
                            <td class="small" style="max-width:200px;">
                                <span th:text="${#strings.abbreviate(d.motif, 120)}"></span>
                            </td>
                            <td class="small">
                                <span th:if="${d.equipements == null or d.equipements.isEmpty()}" class="text-muted">—</span>
                                <th:block th:if="${d.equipements != null and !d.equipements.isEmpty()}">
                                    <th:block th:each="equip, it : ${d.equipements}">
                                        <span th:text="${equip.nom != null and !#strings.isEmpty(equip.nom)} ? ${equip.nom} : ${equip.numeroSerie}"></span><span th:if="${!it.last}">, </span>
                                    </th:block>
                                </th:block>
                            </td>
                            <td>
                                <span th:if="${d.statut.name() == 'EN_ATTENTE'}" class="badge bg-warning text-dark">En attente</span>
                                <span th:if="${d.statut.name() == 'ACCEPTEE'}" class="badge bg-success">Acceptée</span>
                                <span th:if="${d.statut.name() == 'REFUSEE'}" class="badge bg-danger">Refusée</span>
                                <span th:if="${d.statut.name() == 'ANNULEE'}" class="badge bg-secondary">Annulée</span>
                            </td>
                            <td class="text-end">
                                <th:block th:if="${d.statut.name() == 'EN_ATTENTE'}">
                                    <form th:action="@{/admin/reservations/{id}/accepter(id=${d.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-success" onclick="return confirm('Valider cette réservation ?');">Accepter</button>
                                    </form>
                                    <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="|#modalRefus${d.id}|">Refuser</button>
                                </th:block>
                                <div th:if="${d.statut.name() == 'ACCEPTEE'}" class="small text-muted" th:text="${d.traiteParEmail != null ? 'Par ' + d.traiteParEmail : ''}"></div>
                                <div th:if="${d.statut.name() == 'REFUSEE' and d.commentaireAdmin != null}" class="small text-danger text-start" th:text="${d.commentaireAdmin}"></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:each="d : ${demandes}">
    <div class="modal fade" tabindex="-1" th:id="|modalRefus${d.id}|" th:if="${d.statut.name() == 'EN_ATTENTE'}">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Refuser la demande</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/reservations/{id}/refuser(id=${d.id})}" method="post">
                    <div class="modal-body">
                        <label class="form-label">Motif du refus <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="commentaire" rows="3" required placeholder="Expliquez la raison du refus…"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-danger">Confirmer le refus</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/modern-layout.js"></script>
</body>
</html>
