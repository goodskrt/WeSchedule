<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Emploi du temps — ' + ${salle.nomSalle} + ' — WeSchedule'">Emploi du temps salle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
    <style>
        .timetable-wrap { overflow-x: auto; }
        .timetable {
            display:grid;
            grid-template-columns:70px repeat(6,1fr);
            border-radius:var(--radius-xl);
            overflow:hidden;
            border:1px solid var(--gray-200);
            background:var(--gray-200);
            gap:1px;
            min-width:800px;
            box-shadow: var(--shadow-md);
        }
        .tt-head {
            background:linear-gradient(135deg, #0ea5e9, #2563eb);
            color:white;
            padding:1rem .5rem;
            text-align:center;
            font-weight:600;
            font-size:.85rem;
        }
        .tt-head.corner { background:#1d4ed8; display:flex; align-items:center; justify-content:center; }
        .tt-time { background:#f8fafc; padding:.75rem .5rem; text-align:center; font-size:.75rem; color:var(--gray-600); display:flex; align-items:center; justify-content:center; font-weight:600; }
        .tt-time.pause { background: linear-gradient(135deg, #fbbf24, #f59e0b); color:white; font-weight:700; }
        .tt-cell { background:white; min-height:60px; position:relative; padding:4px; }
        .tt-cell.pause { background: repeating-linear-gradient(45deg,#fef3c7,#fef3c7 10px,#fde68a 10px,#fde68a 20px); }
        .seance-block { border-radius:6px; padding:.4rem .5rem; font-size:.72rem; line-height:1.3; height:100%; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; justify-content:space-between; }
        .seance-block:hover { opacity:.9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .seance-block.cm { background:#dbeafe; border-left:3px solid #2563eb; color:#1e3a8a; }
        .seance-block.td { background:#fef3c7; border-left:3px solid #d97706; color:#78350f; }
        .seance-block.tp { background:#d1fae5; border-left:3px solid #059669; color:#064e3b; }
        .seance-block.tpe { background:#f3f4f6; border-left:3px solid #6b7280; color:#374151; }
        .seance-title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .seance-meta  { opacity:.85; font-size:.7rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .week-nav { background:white; border-radius:var(--radius-xl); padding:1rem 1.5rem; box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); }
    </style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: admin-sidebar('salles')}"></div>
<div class="ws-wrapper">
    <div th:replace="~{fragments/header :: admin-header}"></div>
    <main class="ws-main-content">

        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/salles}">Salles</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/salles/details/{id}(id=${salle.idSalle})}" th:text="${salle.nomSalle}">Salle</a></li>
                <li class="breadcrumb-item active">Emploi du temps</li>
            </ol>
        </nav>

        <div class="week-nav mb-3 d-flex flex-wrap gap-2 align-items-center justify-content-between">
            <div>
                <div class="fw-bold">Emploi du temps — Salle <span th:text="${salle.nomSalle}"></span></div>
                <div class="text-muted small">Semaine sélectionnée</div>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-outline-secondary btn-sm" onclick="prevWeek()"><i class="fas fa-chevron-left me-1"></i>Semaine -</button>
                <span class="badge bg-primary" id="lblWeek"></span>
                <button class="btn btn-outline-secondary btn-sm" onclick="nextWeek()">Semaine +<i class="fas fa-chevron-right ms-1"></i></button>
            </div>
        </div>

        <div class="timetable-wrap">
            <div id="grid" class="timetable"></div>
        </div>

        <!-- Modal détails séance -->
        <div class="modal fade" id="modalSeance" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Détails séance</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="fw-bold mb-1" id="mTitle"></div>
                        <div class="text-muted small mb-2" id="mMeta"></div>
                        <div class="small" id="mRem"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/modern-layout.js"></script>
<script th:inline="javascript">
    const SALLE_ID = /*[[${salle.idSalle}]]*/ '';
    const HEURES = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const PAUSE_INDEX = 5; // 13:00
    const JOURS = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];

    let currentWeekNumber = getWeekNumber(new Date());
    let currentYear = new Date().getFullYear();
    let seancesData = {};

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function getMondayOfWeek(week, year) {
        const simple = new Date(year, 0, 1 + (week - 1) * 7);
        const dow = simple.getDay();
        const monday = new Date(simple);
        if (dow <= 4) monday.setDate(simple.getDate() - simple.getDay() + 1);
        else monday.setDate(simple.getDate() + 8 - simple.getDay());
        return monday;
    }

    function prevWeek() { currentWeekNumber--; if (currentWeekNumber < 1) { currentWeekNumber = 52; currentYear--; } refresh(); }
    function nextWeek() { currentWeekNumber++; if (currentWeekNumber > 52) { currentWeekNumber = 1; currentYear++; } refresh(); }

    function buildGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        const corner = document.createElement('div');
        corner.className = 'tt-head corner';
        corner.innerHTML = '<i class=\"fas fa-clock\"></i>';
        grid.appendChild(corner);

        const monday = getMondayOfWeek(currentWeekNumber, currentYear);
        for (let i = 0; i < 6; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const head = document.createElement('div');
            head.className = 'tt-head';
            head.textContent = JOURS[i] + ' ' + String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0');
            grid.appendChild(head);
        }

        for (let hi = 0; hi < HEURES.length; hi++) {
            const timeCell = document.createElement('div');
            timeCell.className = 'tt-time' + (hi === PAUSE_INDEX ? ' pause' : '');
            timeCell.textContent = HEURES[hi];
            grid.appendChild(timeCell);

            for (let di = 0; di < 6; di++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + di);
                const dateStr = d.toISOString().split('T')[0];
                const cell = document.createElement('div');
                cell.className = 'tt-cell' + (hi === PAUSE_INDEX ? ' pause' : '');
                cell.id = 'cell-' + dateStr + '-' + HEURES[hi].replace(':', '');
                if (hi === PAUSE_INDEX) {
                    cell.innerHTML = '<span style=\"color:#9ca3af;font-size:0.75rem;font-weight:600;\">PAUSE</span>';
                }
                grid.appendChild(cell);
            }
        }
    }

    async function loadSeances() {
        const url = `/admin/salles/${SALLE_ID}/emploi-du-temps/api?semaine=${currentWeekNumber}&annee=${currentYear}`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        seancesData = {};
        if (Array.isArray(data)) {
            data.forEach(s => {
                const key = s.date + '-' + (s.heureDebut || '').substring(0, 5).replace(':', '');
                seancesData[key] = s;
            });
        }
    }

    function showSeanceDetails(s) {
        document.getElementById('mTitle').textContent = s.cours?.intitule || 'Séance';
        const parts = [];
        if (s.cours?.typeCours) parts.push(s.cours.typeCours);
        if (s.classe?.nom) parts.push(s.classe.nom);
        if (s.salle?.nomSalle) parts.push(s.salle.nomSalle);
        document.getElementById('mMeta').textContent =
            `${s.date} • ${s.heureDebut?.substring(0,5)}-${s.heureFin?.substring(0,5)} • ${parts.join(' • ')}`;
        document.getElementById('mRem').textContent = s.remarques || '';
        new bootstrap.Modal(document.getElementById('modalSeance')).show();
    }

    function renderSeances() {
        document.querySelectorAll('.tt-cell:not(.pause)').forEach(c => c.innerHTML = '');
        Object.entries(seancesData).forEach(([key, s]) => {
            const cell = document.getElementById('cell-' + key);
            if (!cell) return;
            const typeLower = (s.cours?.typeCours || 'CM').toLowerCase();
            const block = document.createElement('div');
            block.className = 'seance-block ' + typeLower;
            block.onclick = () => showSeanceDetails(s);
            const title = document.createElement('div');
            title.className = 'seance-title';
            title.textContent = s.cours?.intitule || 'Sans titre';
            const meta = document.createElement('div');
            meta.className = 'seance-meta';
            const parts = [];
            if (s.cours?.typeCours) parts.push(s.cours.typeCours);
            if (s.classe?.nom) parts.push(s.classe.nom);
            meta.textContent = parts.join(' • ');
            block.appendChild(title);
            block.appendChild(meta);
            cell.appendChild(block);
        });
    }

    async function refresh() {
        document.getElementById('lblWeek').textContent = `Semaine ${currentWeekNumber} • ${currentYear}`;
        buildGrid();
        await loadSeances();
        renderSeances();
    }

    document.addEventListener('DOMContentLoaded', refresh);
</script>
</body>
</html>
