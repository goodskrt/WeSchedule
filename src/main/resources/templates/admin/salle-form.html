<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'creation' ? 'Nouvelle Salle' : 'Modifier Salle'} + ' - WeSchedule'">Salle - WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard-professional.css">
    <link rel="stylesheet" href="/css/modern-dashboard.css">
    <style>
        .type-option {
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        .type-option:hover {
            border-color: var(--primary-color);
            background: var(--gray-50);
        }
        .type-option input[type="radio"] {
            display: none;
        }
        .type-option input[type="radio"]:checked + .type-content {
            color: var(--primary-color);
        }
        .type-option input[type="radio"]:checked ~ .type-icon {
            background: linear-gradient(135deg, var(--primary-color), var(--green-600));
            color: white;
        }
        .type-option.selected {
            border-color: var(--primary-color);
            background: var(--green-50);
        }
        .type-icon {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
            background: var(--gray-100);
            color: var(--gray-600);
            transition: all var(--transition-fast);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: admin-header}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{fragments/sidebar :: admin-sidebar('salles')}"></div>

            <div class="col-lg-10 col-md-9">
                <div class="main-content">
                    <!-- Breadcrumb -->
                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/admin/salles}">Salles</a></li>
                            <li class="breadcrumb-item active" th:text="${mode == 'creation' ? 'Nouvelle' : 'Modifier'}">Nouvelle</li>
                        </ol>
                    </nav>

                    <!-- Header -->
                    <div class="mb-4">
                        <h2 class="page-title" th:text="${mode == 'creation' ? 'Nouvelle Salle' : 'Modifier la Salle'}">Nouvelle Salle</h2>
                        <p class="page-subtitle" th:text="${mode == 'creation' ? 'Créez une nouvelle salle' : 'Modifiez les informations de la salle'}"></p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Form -->
                    <div class="section-card">
                        <form th:action="${mode == 'creation' ? '/admin/salles/creer' : '/admin/salles/modifier/' + salle.idSalle}" 
                              method="post">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="nomSalle" class="form-label">
                                        <i class="fas fa-door-open me-1"></i> Nom de la salle *
                                    </label>
                                    <input type="text" class="form-control" id="nomSalle" name="nomSalle" 
                                           th:value="${salle.nomSalle}" required
                                           placeholder="Ex: Salle A101">
                                    <small class="text-muted">Le nom doit être unique</small>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="capacite" class="form-label">
                                        <i class="fas fa-users me-1"></i> Capacité *
                                    </label>
                                    <input type="number" class="form-control" id="capacite" name="capacite" 
                                           th:value="${salle.capacite}" required min="1"
                                           placeholder="Ex: 30">
                                    <small class="text-muted">Nombre de places disponibles</small>
                                </div>

                                <div class="col-12 mb-4">
                                    <label class="form-label">
                                        <i class="fas fa-tag me-1"></i> Type de salle *
                                    </label>
                                    <div class="row g-3">
                                        <div class="col-md-3 col-sm-6">
                                            <label class="type-option" th:classappend="${salle.typeSalle?.name() == 'SALLE_DE_COURS'} ? 'selected' : ''">
                                                <input type="radio" name="typeSalle" value="SALLE_DE_COURS" 
                                                       th:checked="${salle.typeSalle?.name() == 'SALLE_DE_COURS'}" required>
                                                <div class="type-content">
                                                    <div class="type-icon">
                                                        <i class="fas fa-chalkboard-teacher"></i>
                                                    </div>
                                                    <h6 class="mb-0">Salle de Cours</h6>
                                                </div>
                                            </label>
                                        </div>
                                        <div class="col-md-3 col-sm-6">
                                            <label class="type-option" th:classappend="${salle.typeSalle?.name() == 'SALLE_DE_TD'} ? 'selected' : ''">
                                                <input type="radio" name="typeSalle" value="SALLE_DE_TD" 
                                                       th:checked="${salle.typeSalle?.name() == 'SALLE_DE_TD'}">
                                                <div class="type-content">
                                                    <div class="type-icon">
                                                        <i class="fas fa-chalkboard"></i>
                                                    </div>
                                                    <h6 class="mb-0">Salle de TD</h6>
                                                </div>
                                            </label>
                                        </div>
                                        <div class="col-md-3 col-sm-6">
                                            <label class="type-option" th:classappend="${salle.typeSalle?.name() == 'SALLE_INFORMATIQUE'} ? 'selected' : ''">
                                                <input type="radio" name="typeSalle" value="SALLE_INFORMATIQUE" 
                                                       th:checked="${salle.typeSalle?.name() == 'SALLE_INFORMATIQUE'}">
                                                <div class="type-content">
                                                    <div class="type-icon">
                                                        <i class="fas fa-laptop"></i>
                                                    </div>
                                                    <h6 class="mb-0">Salle Informatique</h6>
                                                </div>
                                            </label>
                                        </div>
                                        <div class="col-md-3 col-sm-6">
                                            <label class="type-option" th:classappend="${salle.typeSalle?.name() == 'LABORATOIRE'} ? 'selected' : ''">
                                                <input type="radio" name="typeSalle" value="LABORATOIRE" 
                                                       th:checked="${salle.typeSalle?.name() == 'LABORATOIRE'}">
                                                <div class="type-content">
                                                    <div class="type-icon">
                                                        <i class="fas fa-flask"></i>
                                                    </div>
                                                    <h6 class="mb-0">Laboratoire</h6>
                                                </div>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="info-note">
                                <i class="fas fa-lightbulb"></i>
                                <div class="info-note-content">
                                    <div class="info-note-title">Conseil</div>
                                    <p class="mb-0">
                                        Choisissez le type de salle en fonction de son utilisation principale. 
                                        La capacité sera vérifiée automatiquement lors de la réservation.
                                    </p>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>
                                    <span th:text="${mode == 'creation' ? 'Créer la salle' : 'Enregistrer les modifications'}">Créer</span>
                                </button>
                                <a th:href="@{/admin/salles}" class="btn btn-secondary">
                                    <i class="fas fa-times me-1"></i> Annuler
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Gérer la sélection visuelle des types de salle
        document.querySelectorAll('.type-option input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.type-option').forEach(option => {
                    option.classList.remove('selected');
                });
                if (this.checked) {
                    this.closest('.type-option').classList.add('selected');
                }
            });
        });
    </script>
</body>
</html>
