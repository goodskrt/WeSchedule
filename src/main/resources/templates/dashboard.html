<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - WeSchedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">WeSchedule</span>
        <span class="text-white">Bonjour, <span th:text="${user.prenom}"></span> !</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h4>Bienvenue sur votre tableau de bord</h4>
                </div>
                <div class="card-body">
                    <p class="lead">Vous êtes connecté en tant que <strong th:text="${user.role}"></strong></p>
                    <p>Email : <span th:text="${user.email}"></span></p>
                    <hr>
                    <h5>Prochaines étapes</h5>
                    <ul>
                        <li>Gestion des réservations de salles</li>
                        <li>Emploi du temps</li>
                        <li>Notifications</li>
                        <li>Administration</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
