<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Modifier' : 'Nouvelle'} + ' Disponibilite - WeSchedule'">Disponibilite - WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
    <style>
        .week-info { background: var(--green-50); border: 1px solid var(--green-200); padding: 1rem 1.25rem; border-radius: var(--radius-lg); margin-bottom: 1.5rem; }
        .schedule-grid { display: grid; grid-template-columns: 70px repeat(7, 1fr); gap: 1px; background: var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }
        .schedule-header { background: linear-gradient(135deg, var(--primary-color), var(--green-600)); color: white; padding: 0.625rem 0.25rem; text-align: center; font-weight: 600; font-size: 0.8rem; }
        .schedule-time { background: var(--gray-50); padding: 0.375rem; text-align: center; font-size: 0.7rem; color: var(--gray-600); display: flex; align-items: center; justify-content: center; }
        .schedule-cell { background: white; min-height: 32px; cursor: pointer; transition: all var(--transition-fast); position: relative; }
        .schedule-cell:hover { background: var(--green-100); }
        .schedule-cell.selected { background: linear-gradient(135deg, rgba(5,150,105,0.4), rgba(22,163,74,0.4)); }
        .schedule-cell.selected::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--green-800); font-weight: bold; font-size: 0.9rem; }
        .legend { display: flex; gap: 1.25rem; margin-top: 1rem; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .legend-box { width: 20px; height: 20px; border-radius: var(--radius-sm); }
        .legend-available { background: linear-gradient(135deg, rgba(5,150,105,0.4), rgba(22,163,74,0.4)); }
        .legend-unavailable { background: white; border: 1px solid var(--gray-300); }
        .week-selector-card { background: white; border-radius: var(--radius-xl); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: enseignant-sidebar('disponibilites')}"></div>
    <div class="ws-wrapper">
        <div th:replace="~{fragments/header :: enseignant-header}"></div>
        <main class="ws-main-content">
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/dashboard/enseignant/disponibilites">Mes Disponibilites</a></li>
                        <li class="breadcrumb-item active" th:text="${isEdit ? 'Modifier' : 'Nouvelle'}">Action</li>
                    </ol>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="page-title">
                        <i th:class="${isEdit ? 'fas fa-edit text-primary' : 'fas fa-plus-circle text-success'}" class="me-2"></i>
                        <span th:text="${isEdit ? 'Modifier la disponibilite' : 'Nouvelle disponibilite'}">Titre</span>
                    </h2>
                    <a href="/dashboard/enseignant/disponibilites" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Retour</a>
                </div>

                <div th:if="${!isEdit}" class="week-selector-card" id="weekSelectorCard">
                    <h5 class="mb-3"><i class="fas fa-calendar me-2"></i>Etape 1 : Choisissez la semaine</h5>
                    <div class="row align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">Date de debut de semaine</label>
                            <input type="date" class="form-control" id="dateDebut">
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-primary" onclick="validerSemaine()"><i class="fas fa-check"></i> Valider la semaine</button>
                        </div>
                    </div>
                </div>

                <div th:if="${isEdit}" class="week-info">
                    <h5 class="mb-1"><i class="fas fa-calendar-week me-2"></i>Semaine du <span th:text="${#temporals.format(disponibilite.dateDebut, 'dd MMMM yyyy')}"></span></h5>
                    <small class="text-muted">Du <span th:text="${#temporals.format(disponibilite.dateDebut, 'EEEE dd/MM')}"></span> au <span th:text="${#temporals.format(disponibilite.dateFin, 'EEEE dd/MM/yyyy')}"></span></small>
                </div>

                <div class="card-custom p-4" id="scheduleCard" th:style="${isEdit ? '' : 'display: none;'}">
                    <div th:if="${!isEdit}" class="week-info mb-3" id="weekInfoDisplay" style="display: none;">
                        <h5 class="mb-1"><i class="fas fa-calendar-week me-2"></i>Semaine du <span id="weekStartDisplay"></span></h5>
                        <small class="text-muted">Du <span id="weekRangeDisplay"></span></small>
                    </div>

                    <h5 class="mb-3"><i class="fas fa-table me-2"></i><span th:text="${isEdit ? 'Etape 1' : 'Etape 2'}"></span> : Selectionnez vos creneaux</h5>
                    <p class="text-muted small"><i class="fas fa-info-circle"></i> Cliquez sur les cases pour selectionner/deselectionner vos disponibilites</p>

                    <div class="schedule-grid" id="scheduleGrid">
                        <div class="schedule-header"></div>
                        <div class="schedule-header" id="header-0">Lun</div>
                        <div class="schedule-header" id="header-1">Mar</div>
                        <div class="schedule-header" id="header-2">Mer</div>
                        <div class="schedule-header" id="header-3">Jeu</div>
                        <div class="schedule-header" id="header-4">Ven</div>
                        <div class="schedule-header" id="header-5">Sam</div>
                        <div class="schedule-header" id="header-6">Dim</div>
                    </div>

                    <div class="legend">
                        <div class="legend-item"><div class="legend-box legend-available"></div><span>Disponible</span></div>
                        <div class="legend-item"><div class="legend-box legend-unavailable"></div><span>Non disponible</span></div>
                    </div>

                    <div class="mt-4 d-flex flex-wrap gap-2">
                        <button class="btn btn-primary" onclick="saveDisponibilite()"><i class="fas fa-save"></i> <span th:text="${isEdit ? 'Enregistrer' : 'Creer'}">Enregistrer</span></button>
                        <button class="btn btn-secondary" onclick="selectAll()"><i class="fas fa-check-double"></i> Tout selectionner</button>
                        <button class="btn btn-secondary" onclick="deselectAll()"><i class="fas fa-times"></i> Tout deselectionner</button>
                        <a href="/dashboard/enseignant/disponibilites" class="btn btn-outline-danger ms-auto"><i class="fas fa-ban"></i> Annuler</a>
                    </div>
                </div>
            </main>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalTitle">Resultat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="resultModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="resultModalBtn" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modern-layout.js"></script>
    <script th:inline="javascript">
        const isEdit = /*[[${isEdit}]]*/ false;
        const disponibiliteId = /*[[${isEdit ? disponibilite.id.toString() : null}]]*/ null;
        const existingSlots = [];
        /*[# th:if="${creneauxList != null && !creneauxList.isEmpty()}"]*/
        /*[# th:each="slot : ${creneauxList}"]*/
        existingSlots.push({ dayIndex: /*[[${slot.get('dayIndex')}]]*/ 0, heureDebut: /*[[${slot.get('heureDebut')}]]*/ '08:00', heureFin: /*[[${slot.get('heureFin')}]]*/ '09:00' });
        /*[/]*/
        /*[/]*/
        
        const timeSlots = ['08:00-09:00','09:00-10:00','10:00-11:00','11:00-12:00','12:00-13:00','13:00-14:00','14:00-15:00','15:00-16:00','16:00-17:00','17:00-18:00','18:00-19:00','19:00-20:00'];
        let weekDates = [];
        let selectedSlots = new Set();
        let resultModal;

        document.addEventListener('DOMContentLoaded', function() {
            resultModal = new bootstrap.Modal(document.getElementById('resultModal'));
            initGrid();
        });

        function initGrid() {
            const grid = document.getElementById('scheduleGrid');
            timeSlots.forEach((slot, slotIndex) => {
                const timeCell = document.createElement('div');
                timeCell.className = 'schedule-time';
                timeCell.textContent = slot;
                grid.appendChild(timeCell);
                for (let day = 0; day < 7; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'schedule-cell';
                    cell.dataset.day = day;
                    cell.dataset.slot = slotIndex;
                    cell.onclick = () => toggleCell(cell);
                    grid.appendChild(cell);
                }
            });
            if (isEdit) loadExistingSlots();
        }

        function toggleCell(cell) {
            const key = cell.dataset.day + '-' + cell.dataset.slot;
            if (selectedSlots.has(key)) { selectedSlots.delete(key); cell.classList.remove('selected'); }
            else { selectedSlots.add(key); cell.classList.add('selected'); }
        }

        function selectAll() { document.querySelectorAll('.schedule-cell').forEach(cell => { selectedSlots.add(cell.dataset.day + '-' + cell.dataset.slot); cell.classList.add('selected'); }); }
        function deselectAll() { selectedSlots.clear(); document.querySelectorAll('.schedule-cell').forEach(cell => cell.classList.remove('selected')); }

        function validerSemaine() {
            const dateInput = document.getElementById('dateDebut');
            if (!dateInput.value) { showResult('Erreur', 'Veuillez selectionner une date', 'danger'); return; }
            const date = new Date(dateInput.value);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            weekDates = [];
            const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                weekDates.push(d.toISOString().split('T')[0]);
                document.getElementById('header-' + i).innerHTML = dayNames[i] + '<br><small>' + d.getDate() + '/' + (d.getMonth()+1) + '</small>';
            }
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            document.getElementById('weekStartDisplay').textContent = formatDate(monday);
            document.getElementById('weekRangeDisplay').textContent = formatDateShort(monday) + ' au ' + formatDate(sunday);
            document.getElementById('weekInfoDisplay').style.display = 'block';
            document.getElementById('scheduleCard').style.display = 'block';
            document.getElementById('weekSelectorCard').style.display = 'none';
        }

        function formatDate(d) { return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'}); }
        function formatDateShort(d) { return d.toLocaleDateString('fr-FR', {weekday:'long',day:'2-digit',month:'2-digit'}); }

        function loadExistingSlots() {
            if (!existingSlots || existingSlots.length === 0) return;
            existingSlots.forEach(slot => {
                const dayIndex = parseInt(slot.dayIndex);
                const startHour = parseInt(slot.heureDebut.split(':')[0]);
                const endHour = parseInt(slot.heureFin.split(':')[0]);
                for (let hour = startHour; hour < endHour; hour++) {
                    const slotIndex = hour - 8;
                    if (slotIndex >= 0 && slotIndex < timeSlots.length) {
                        const key = dayIndex + '-' + slotIndex;
                        selectedSlots.add(key);
                        const cell = document.querySelector('.schedule-cell[data-day="' + dayIndex + '"][data-slot="' + slotIndex + '"]');
                        if (cell) cell.classList.add('selected');
                    }
                }
            });
        }

        function saveDisponibilite() {
            if (!isEdit && weekDates.length === 0) { showResult('Erreur', 'Veuillez d\'abord selectionner une semaine', 'danger'); return; }
            if (selectedSlots.size === 0) { showResult('Erreur', 'Veuillez selectionner au moins un creneau', 'danger'); return; }
            const slotsByDay = {};
            selectedSlots.forEach(key => { const [day, slot] = key.split('-').map(Number); if (!slotsByDay[day]) slotsByDay[day] = []; slotsByDay[day].push(slot); });
            const creneaux = [];
            Object.keys(slotsByDay).forEach(day => {
                const slots = slotsByDay[day].sort((a, b) => a - b);
                let start = slots[0], end = slots[0];
                for (let i = 1; i <= slots.length; i++) {
                    if (i < slots.length && slots[i] === end + 1) { end = slots[i]; }
                    else { creneaux.push({ dayIndex: parseInt(day), heureDebut: (start + 8).toString().padStart(2, '0') + ':00', heureFin: (end + 9).toString().padStart(2, '0') + ':00' }); if (i < slots.length) { start = slots[i]; end = slots[i]; } }
                }
            });
            const url = isEdit ? '/dashboard/enseignant/api/disponibilites/' + disponibiliteId + '/update' : '/dashboard/enseignant/api/disponibilites/create';
            fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dateDebut: isEdit ? null : weekDates[0], creneaux: creneaux }) })
            .then(r => r.json())
            .then(result => { if (result.success) showResult('Succes', isEdit ? 'Disponibilite mise a jour' : 'Disponibilite creee', 'success', true); else showResult('Erreur', result.message || 'Erreur', 'danger'); })
            .catch(e => { showResult('Erreur', 'Erreur de connexion', 'danger'); });
        }

        function showResult(title, message, type, redirect) {
            document.getElementById('resultModalTitle').innerHTML = (type === 'danger' ? '<i class="fas fa-times-circle text-danger me-2"></i>' : '<i class="fas fa-check-circle text-success me-2"></i>') + title;
            document.getElementById('resultModalBody').textContent = message;
            if (redirect) document.getElementById('resultModalBtn').onclick = () => window.location.href = '/dashboard/enseignant/disponibilites';
            resultModal.show();
        }
    </script>
</body>
</html>
