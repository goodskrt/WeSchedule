<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Cours - WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-layout.css">
    <style>
        .filter-card {
            background: white; border-radius: var(--radius-xl); padding: 1.5rem;
            border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); margin-bottom: 1.5rem;
        }
        .filter-title { font-size: 1rem; font-weight: 600; color: var(--gray-900); margin-bottom: 1rem; }
        .filter-group { display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; }
        .filter-item { flex: 1; min-width: 200px; }
        .filter-item label { font-size: 0.875rem; font-weight: 500; color: var(--gray-700); margin-bottom: 0.5rem; display: block; }
        .filter-item select, .filter-item input { width: 100%; padding: 0.625rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-lg); font-size: 0.9rem; transition: all 0.2s; }
        .filter-item select:focus, .filter-item input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(5,150,105,0.1); }
        .filter-actions { display: flex; gap: 0.5rem; }
        .cours-card {
            background: white; border-radius: var(--radius-xl); padding: 1.5rem;
            border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm);
            transition: all 0.2s; margin-bottom: 1rem;
        }
        .cours-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary-color); }
        .cours-type { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; }
        .cours-type.cm { background: #dbeafe; color: #1e3a8a; }
        .cours-type.td { background: #fef3c7; color: #78350f; }
        .cours-type.tp { background: #d1fae5; color: #064e3b; }
        .progress-bar-custom { height: 8px; border-radius: 4px; background: var(--gray-200); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 0.3s; }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: var(--radius-xl); }
        .empty-state i { font-size: 4rem; color: var(--gray-300); margin-bottom: 1.5rem; }
        .stats-summary { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 150px; background: linear-gradient(135deg, var(--primary-color), var(--green-600)); color: white; padding: 1rem; border-radius: var(--radius-lg); text-align: center; }
        .stat-box .stat-value { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        .stat-box .stat-label { font-size: 0.875rem; opacity: 0.9; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: enseignant-sidebar('cours')}"></div>
    <div class="ws-wrapper">
        <div th:replace="~{fragments/header :: enseignant-header}"></div>
        <main class="ws-main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="page-title">Mes Cours</h2>
                    <p class="page-subtitle">Consulter et gérer mes cours assignés</p>
                </div>
            </div>

            <!-- Statistiques résumées -->
            <div class="stats-summary" id="statsSummary">
                <div class="stat-box">
                    <div class="stat-value" id="totalCoursCount">0</div>
                    <div class="stat-label">Cours total</div>
                </div>
                <div class="stat-box" style="background: linear-gradient(135deg, #2563eb, #1e40af);">
                    <div class="stat-value" id="cmCount">0</div>
                    <div class="stat-label">CM</div>
                </div>
                <div class="stat-box" style="background: linear-gradient(135deg, #d97706, #b45309);">
                    <div class="stat-value" id="tdCount">0</div>
                    <div class="stat-label">TD</div>
                </div>
                <div class="stat-box" style="background: linear-gradient(135deg, #059669, #047857);">
                    <div class="stat-value" id="tpCount">0</div>
                    <div class="stat-label">TP</div>
                </div>
            </div>

            <!-- Filtres -->
            <div class="filter-card">
                <div class="filter-title"><i class="fas fa-filter me-2"></i>Filtres</div>
                <div class="filter-group">
                    <div class="filter-item">
                        <label for="filterType">Type de cours</label>
                        <select id="filterType" class="form-select">
                            <option value="">Tous les types</option>
                            <option value="CM">CM</option>
                            <option value="TD">TD</option>
                            <option value="TP">TP</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="filterClasse">Classe</label>
                        <select id="filterClasse" class="form-select">
                            <option value="">Toutes les classes</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="filterSearch">Recherche</label>
                        <input type="text" id="filterSearch" class="form-control" placeholder="Rechercher un cours...">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-secondary" onclick="resetFilters()"><i class="fas fa-redo me-1"></i>Réinitialiser</button>
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(cours)}" class="empty-state">
                <i class="fas fa-book"></i>
                <h4>Aucun cours assigné</h4>
                <p class="text-muted">Vous n'avez pas encore de cours assignés.</p>
            </div>

            <!-- Liste des cours -->
            <div th:unless="${#lists.isEmpty(cours)}">
                <div th:each="c : ${cours}" class="cours-card" 
                     th:attr="data-type=${c.typeCours != null ? c.typeCours.name() : 'CM'}, data-classe=${c.classe != null ? c.classe.nom : ''}, data-intitule=${c.intitule}">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <span class="cours-type" th:classappend="${c.typeCours != null ? c.typeCours.name().toLowerCase() : 'cm'}" 
                                      th:text="${c.typeCours != null ? c.typeCours.name() : 'CM'}">CM</span>
                                <h5 class="mb-0" th:text="${c.intitule}">Intitulé du cours</h5>
                            </div>
                            <div class="text-muted small">
                                <i class="fas fa-graduation-cap me-1"></i>
                                <span th:text="${c.classe != null ? c.classe.nom : 'Classe non définie'}">Classe</span>
                                <span th:if="${c.ue != null}" class="ms-3">
                                    <i class="fas fa-book me-1"></i>
                                    <span th:text="${c.ue.code + ' - ' + c.ue.intitule}">UE</span>
                                </span>
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold" style="font-size: 1.25rem; color: var(--primary-color);">
                                <span th:text="${c.dureeRestante != null ? c.dureeRestante : 0}">0</span>h / 
                                <span th:text="${c.dureeTotal != null ? c.dureeTotal : 0}">0</span>h
                            </div>
                            <small class="text-muted">Heures restantes</small>
                        </div>
                    </div>

                    <!-- Barre de progression -->
                    <div class="progress-bar-custom mb-2">
                        <div class="progress-fill" 
                             th:style="'width: ' + ${c.dureeTotal != null and c.dureeTotal > 0 ? ((c.dureeTotal - (c.dureeRestante != null ? c.dureeRestante : c.dureeTotal)) * 100.0 / c.dureeTotal) : 0} + '%'"></div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">
                            <span th:text="${c.dureeTotal != null and c.dureeTotal > 0 ? ((c.dureeTotal - (c.dureeRestante != null ? c.dureeRestante : c.dureeTotal)) * 100.0 / c.dureeTotal) : 0}">0</span>% effectué
                        </small>
                        <small class="text-muted" th:if="${c.description != null and !c.description.isEmpty()}">
                            <i class="fas fa-info-circle me-1"></i>
                            <span th:text="${c.description}">Description</span>
                        </small>
                    </div>
                </div>
            </div>

            <!-- Message si aucun résultat après filtrage -->
            <div id="noResultsMessage" class="empty-state" style="display: none;">
                <i class="fas fa-search"></i>
                <h4>Aucun cours trouvé</h4>
                <p class="text-muted">Essayez de modifier vos critères de recherche</p>
            </div>

        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/modern-layout.js"></script>
    <script>
        // Données des cours
        const allCours = Array.from(document.querySelectorAll('.cours-card'));
        
        // Initialiser les filtres
        function initFilters() {
            // Remplir le select des classes
            const classes = new Set();
            allCours.forEach(card => {
                const classe = card.getAttribute('data-classe');
                if (classe) classes.add(classe);
            });
            
            const filterClasse = document.getElementById('filterClasse');
            classes.forEach(classe => {
                const option = document.createElement('option');
                option.value = classe;
                option.textContent = classe;
                filterClasse.appendChild(option);
            });
            
            // Mettre à jour les statistiques
            updateStats();
        }
        
        // Appliquer les filtres
        function applyFilters() {
            const filterType = document.getElementById('filterType').value.toLowerCase();
            const filterClasse = document.getElementById('filterClasse').value.toLowerCase();
            const filterSearch = document.getElementById('filterSearch').value.toLowerCase();
            
            let visibleCount = 0;
            let cmCount = 0, tdCount = 0, tpCount = 0;
            
            allCours.forEach(card => {
                const type = card.getAttribute('data-type').toLowerCase();
                const classe = card.getAttribute('data-classe').toLowerCase();
                const intitule = card.getAttribute('data-intitule').toLowerCase();
                
                const matchType = !filterType || type === filterType;
                const matchClasse = !filterClasse || classe === filterClasse;
                const matchSearch = !filterSearch || intitule.includes(filterSearch) || classe.includes(filterSearch);
                
                if (matchType && matchClasse && matchSearch) {
                    card.style.display = 'block';
                    visibleCount++;
                    if (type === 'cm') cmCount++;
                    else if (type === 'td') tdCount++;
                    else if (type === 'tp') tpCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Afficher/masquer le message "aucun résultat"
            document.getElementById('noResultsMessage').style.display = visibleCount === 0 ? 'block' : 'none';
            
            // Mettre à jour les stats
            document.getElementById('totalCoursCount').textContent = visibleCount;
            document.getElementById('cmCount').textContent = cmCount;
            document.getElementById('tdCount').textContent = tdCount;
            document.getElementById('tpCount').textContent = tpCount;
        }
        
        // Réinitialiser les filtres
        function resetFilters() {
            document.getElementById('filterType').value = '';
            document.getElementById('filterClasse').value = '';
            document.getElementById('filterSearch').value = '';
            applyFilters();
        }
        
        // Mettre à jour les statistiques initiales
        function updateStats() {
            let cmCount = 0, tdCount = 0, tpCount = 0;
            allCours.forEach(card => {
                const type = card.getAttribute('data-type').toLowerCase();
                if (type === 'cm') cmCount++;
                else if (type === 'td') tdCount++;
                else if (type === 'tp') tpCount++;
            });
            
            document.getElementById('totalCoursCount').textContent = allCours.length;
            document.getElementById('cmCount').textContent = cmCount;
            document.getElementById('tdCount').textContent = tdCount;
            document.getElementById('tpCount').textContent = tpCount;
        }
        
        // Événements
        document.getElementById('filterType').addEventListener('change', applyFilters);
        document.getElementById('filterClasse').addEventListener('change', applyFilters);
        document.getElementById('filterSearch').addEventListener('input', applyFilters);
        
        // Initialiser au chargement
        document.addEventListener('DOMContentLoaded', initFilters);
    </script>
</body>
</html>
