<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Cours - WeSchedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard-professional.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard/enseignant"><img src="/images/logo.jpeg" alt="Logo">WeSchedule</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link p-0" href="#" data-bs-toggle="dropdown">
                            <div class="user-info-nav">
                                <div class="user-avatar-small"><i class="fas fa-chalkboard-teacher"></i></div>
                                <div class="user-details"><div class="user-name-small" th:text="${nomComplet}">Enseignant</div><div class="user-role-small">Enseignant</div></div>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/dashboard/enseignant/profil"><i class="fas fa-user"></i> Mon profil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><form th:action="@{/logout}" method="post" style="margin: 0;"><button type="submit" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Deconnexion</button></form></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 col-md-3 p-0">
                <div class="sidebar">
                    <div class="sidebar-menu">
                        <div class="menu-section-title">Tableau de bord</div>
                        <a href="/dashboard/enseignant" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Vue d'ensemble</span></a>
                        <div class="menu-section-title">Mon activite</div>
                        <a href="/dashboard/enseignant/cours" class="nav-link active"><i class="fas fa-book"></i><span>Mes Cours</span></a>
                        <a href="/dashboard/enseignant/emploi-temps" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Mon Emploi du temps</span></a>
                        <a href="/dashboard/enseignant/disponibilites" class="nav-link"><i class="fas fa-clock"></i><span>Mes Disponibilites</span></a>
                        <div class="menu-section-title">Compte</div>
                        <a href="/dashboard/enseignant/profil" class="nav-link"><i class="fas fa-user-cog"></i><span>Mon Profil</span></a>
                    </div>
                </div>
            </div>

            <div class="col-lg-10 col-md-9">
                <div class="main-content">
                    <h2 class="page-title">Mes Cours</h2>
                    <p class="page-subtitle">Consulter et gerer mes cours</p>
                    <div class="card-custom p-5 text-center mt-4">
                        <div class="empty-state-icon"><i class="fas fa-book"></i></div>
                        <p class="text-muted">Fonctionnalite en cours de developpement</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
