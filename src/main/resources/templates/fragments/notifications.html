<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="notification-modals">
        <!-- Modal Succès -->
        <div th:if="${success}" class="modal fade" id="modalSuccess" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-body text-center p-5">
                        <div class="mb-4">
                            <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h4 class="fw-bold mb-3">Succès !</h4>
                        <p class="text-muted mb-4" th:text="${success}"></p>
                        <button type="button" class="btn btn-success px-5 rounded-pill" data-bs-dismiss="modal">Continuer</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Erreur -->
        <div th:if="${error}" class="modal fade" id="modalError" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-body text-center p-5">
                        <div class="mb-4">
                            <i class="fas fa-exclamation-circle text-danger" style="font-size: 4rem;"></i>
                        </div>
                        <h4 class="fw-bold mb-3">Oups !</h4>
                        <p class="text-muted mb-4" th:text="${error}"></p>
                        <button type="button" class="btn btn-danger px-5 rounded-pill" data-bs-dismiss="modal">Fermer</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Confirmation -->
        <div class="modal fade" id="modalConfirm" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-body text-center p-4">
                        <div class="mb-3">
                            <i class="fas fa-question-circle text-warning" style="font-size: 3rem;"></i>
                        </div>
                        <h5 class="fw-bold mb-2">Confirmation</h5>
                        <p class="text-muted small mb-4" id="confirmText">Êtes-vous sûr ?</p>
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Annuler</button>
                            <button type="button" class="btn btn-primary btn-sm px-3" id="confirmActionBtn">Confirmer</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            let confirmCallback = null;

            function wsConfirm(message, callback) {
                document.getElementById('confirmText').innerText = message;
                confirmCallback = callback;
                var modal = new bootstrap.Modal(document.getElementById('modalConfirm'));
                modal.show();
            }

            document.getElementById('confirmActionBtn').addEventListener('click', function() {
                if (confirmCallback) confirmCallback();
                bootstrap.Modal.getInstance(document.getElementById('modalConfirm')).hide();
            });

            document.addEventListener('DOMContentLoaded', function() {
                var successMsg = /*[[${success}]]*/ null;
                var errorMsg = /*[[${error}]]*/ null;
                
                if (successMsg) {
                    var modal = new bootstrap.Modal(document.getElementById('modalSuccess'));
                    modal.show();
                }
                if (errorMsg) {
                    var modal = new bootstrap.Modal(document.getElementById('modalError'));
                    modal.show();
                }
            });
        </script>
    </div>
</body>
</html>
