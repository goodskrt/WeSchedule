<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Fragment: Sidebar Admin -->
    <div th:fragment="admin-sidebar(activePage)" class="col-lg-2 col-md-3 p-0">
        <div class="sidebar">
            <div class="sidebar-menu">
                <div class="menu-section-title">Tableau de bord</div>
                <a href="/dashboard/admin" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Vue d'ensemble</span>
                </a>
                
                <div class="menu-section-title">Gestion</div>
                <a href="/dashboard/admin/enseignants" class="nav-link" th:classappend="${activePage == 'enseignants'} ? 'active' : ''">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Enseignants</span>
                </a>
                <a href="/admin/salles" class="nav-link" th:classappend="${activePage == 'salles'} ? 'active' : ''">
                    <i class="fas fa-door-open"></i>
                    <span>Salles</span>
                </a>
                <a href="/admin/cours" class="nav-link" th:classappend="${activePage == 'cours'} ? 'active' : ''">
                    <i class="fas fa-book"></i>
                    <span>Cours</span>
                </a>
                <a href="/admin/emplois-du-temps" class="nav-link" th:classappend="${activePage == 'emplois'} ? 'active' : ''">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Emplois du temps</span>
                </a>
                
                <div class="menu-section-title">Système</div>
                <a href="/dashboard/admin/rapports" class="nav-link" th:classappend="${activePage == 'rapports'} ? 'active' : ''">
                    <i class="fas fa-chart-bar"></i>
                    <span>Rapports</span>
                </a>
                <a href="/dashboard/admin/parametres" class="nav-link" th:classappend="${activePage == 'parametres'} ? 'active' : ''">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Fragment: Sidebar Enseignant -->
    <div th:fragment="enseignant-sidebar(activePage)" class="col-lg-2 col-md-3 p-0">
        <div class="sidebar">
            <div class="sidebar-menu">
                <div class="menu-section-title">Tableau de bord</div>
                <a href="/dashboard/enseignant" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Vue d'ensemble</span>
                </a>
                
                <div class="menu-section-title">Mon activité</div>
                <a href="/dashboard/enseignant/cours" class="nav-link" th:classappend="${activePage == 'cours'} ? 'active' : ''">
                    <i class="fas fa-book"></i>
                    <span>Mes Cours</span>
                </a>
                <a href="/dashboard/enseignant/emploi-temps" class="nav-link" th:classappend="${activePage == 'emploi-temps'} ? 'active' : ''">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Mon Emploi du temps</span>
                </a>
                <a href="/dashboard/enseignant/disponibilites" class="nav-link" th:classappend="${activePage == 'disponibilites'} ? 'active' : ''">
                    <i class="fas fa-clock"></i>
                    <span>Mes Disponibilités</span>
                </a>
                
                <div class="menu-section-title">Compte</div>
                <a href="/dashboard/enseignant/profil" class="nav-link" th:classappend="${activePage == 'profil'} ? 'active' : ''">
                    <i class="fas fa-user-cog"></i>
                    <span>Mon Profil</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
