<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WeSchedule - Plateforme de gestion d'emploi du temps pour établissements éducatifs">
    <title>WeSchedule - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth-professional.css">
    <style>
        /* Overlay de chargement */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-2xl);
            border: 1px solid var(--gray-200);
            max-width: 320px;
            width: 90%;
        }

        .loading-spinner {
            width: 3rem;
            height: 3rem;
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        .loading-text {
            color: var(--gray-700);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .loading-subtext {
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        /* Animation des points */
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Amélioration du bouton de connexion */
        .btn-loading {
            position: relative;
            overflow: hidden;
        }

        .btn-loading .btn-text {
            transition: opacity 0.3s ease;
        }

        .btn-loading.loading .btn-text {
            opacity: 0;
        }

        .btn-loading .btn-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-loading.loading .btn-spinner {
            opacity: 1;
        }

        /* Styles pour les champs requis */
        .text-danger {
            color: #dc3545;
        }

        /* Messages d'erreur de validation */
        .invalid-feedback {
            display: none;
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #fee;
            border-radius: 0.5rem;
            border-left: 3px solid #dc3545;
        }

        .invalid-feedback i {
            margin-right: 0.25rem;
        }

        /* États de validation des champs */
        .form-input.is-invalid {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .form-input.is-invalid:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .form-input.is-valid {
            border-color: #28a745;
            background-color: #f0fff4;
        }

        .form-input.is-valid:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }

        /* Animation shake pour les erreurs */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
        }
    </style>
</head>
<body>
<!-- Overlay de chargement -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">Connexion en cours<span class="loading-dots"></span></div>
        <div class="loading-subtext">Vérification de vos identifiants</div>
    </div>
</div>

<div class="auth-container fade-in">
    <div class="auth-header">
        <h1 class="auth-title">WeSchedule</h1>
        <p class="auth-subtitle">Gestion d'emploi du temps - Connexion sécurisée</p>
    </div>

    <!-- Alertes -->
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <span class="alert-icon"><i class="fas fa-exclamation-circle"></i></span>
        <strong>Erreur !</strong>
        <span th:text="${error}"></span>
    </div>

    <div th:if="${logout}" class="alert alert-success" role="alert">
        <span class="alert-icon"><i class="fas fa-check-circle"></i></span>
        <strong>Succès !</strong>
        Vous avez été déconnecté avec succès.
    </div>

    <!-- Formulaire -->
    <form th:action="@{/login}" method="post" id="loginForm" class="auth-form">
        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-envelope"></i> Email <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <i class="input-icon fas fa-envelope"></i>
                <input type="email"
                       class="form-input"
                       id="username"
                       name="username"
                       required
                       autofocus
                       placeholder="votre.email@exemple.com"
                       title="Veuillez entrer une adresse email valide">
            </div>
            <div class="invalid-feedback" id="emailError" style="display: none;">
                <i class="fas fa-exclamation-circle"></i> Veuillez entrer une adresse email valide
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> Mot de passe <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <i class="input-icon fas fa-lock"></i>
                <input type="password"
                       class="form-input"
                       id="password"
                       name="password"
                       required
                       minlength="6"
                       placeholder="••••••••"
                       title="Le mot de passe doit contenir au moins 6 caractères">
                <button type="button" class="input-toggle" onclick="togglePasswordVisibility()">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <div class="invalid-feedback" id="passwordError" style="display: none;">
                <i class="fas fa-exclamation-circle"></i> Le mot de passe est requis (minimum 6 caractères)
            </div>
        </div>

        <div class="form-actions">
            <div></div>
            <a href="/reset-password-request" class="auth-link">
                <i class="fas fa-question-circle"></i> Mot de passe oublié ?
            </a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-loading" id="submitBtn">
            <span class="btn-text">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </span>
            <span class="btn-spinner">
                <span class="spinner"></span>
            </span>
        </button>
    </form>
</div>

<script>
    // Toggle visibilité du mot de passe
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.querySelector('.input-toggle i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // Validation du formulaire
    function validateForm() {
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        let isValid = true;

        // Validation de l'email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!usernameInput.value.trim()) {
            usernameInput.classList.add('is-invalid', 'shake');
            usernameInput.classList.remove('is-valid');
            emailError.textContent = 'L\'adresse email est requise';
            emailError.style.display = 'block';
            isValid = false;
            setTimeout(() => usernameInput.classList.remove('shake'), 500);
        } else if (!emailRegex.test(usernameInput.value.trim())) {
            usernameInput.classList.add('is-invalid', 'shake');
            usernameInput.classList.remove('is-valid');
            emailError.textContent = 'Veuillez entrer une adresse email valide';
            emailError.style.display = 'block';
            isValid = false;
            setTimeout(() => usernameInput.classList.remove('shake'), 500);
        } else {
            usernameInput.classList.remove('is-invalid');
            usernameInput.classList.add('is-valid');
            emailError.style.display = 'none';
        }

        // Validation du mot de passe
        if (!passwordInput.value.trim()) {
            passwordInput.classList.add('is-invalid', 'shake');
            passwordInput.classList.remove('is-valid');
            passwordError.textContent = 'Le mot de passe est requis';
            passwordError.style.display = 'block';
            isValid = false;
            setTimeout(() => passwordInput.classList.remove('shake'), 500);
        } else if (passwordInput.value.length < 6) {
            passwordInput.classList.add('is-invalid', 'shake');
            passwordInput.classList.remove('is-valid');
            passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
            passwordError.style.display = 'block';
            isValid = false;
            setTimeout(() => passwordInput.classList.remove('shake'), 500);
        } else {
            passwordInput.classList.remove('is-invalid');
            passwordInput.classList.add('is-valid');
            passwordError.style.display = 'none';
        }

        return isValid;
    }

    // Gestion du chargement lors de la soumission
    let isSubmitting = false; // Variable pour éviter les soumissions multiples
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Empêcher la soumission par défaut pour valider d'abord

        // Empêcher les soumissions multiples
        if (isSubmitting) {
            return false;
        }

        // Valider le formulaire
        if (!validateForm()) {
            // Focus sur le premier champ invalide
            const firstInvalid = document.querySelector('.form-input.is-invalid');
            if (firstInvalid) {
                firstInvalid.focus();
            }
            return false;
        }

        // Marquer comme en cours de soumission
        isSubmitting = true;

        // Si la validation passe, soumettre le formulaire
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        loadingOverlay.classList.add('show');

        // Soumettre le formulaire
        this.submit();
    });

    // Masquer le loading si on revient sur la page (bouton retour du navigateur)
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            hideLoading();
        }
    });

    // Masquer le loading en cas d'erreur (page rechargée avec erreur)
    window.addEventListener('load', function() {
        const errorAlert = document.querySelector('.alert-danger');
        if (errorAlert) {
            hideLoading();
        }
    });

    // Fonction pour masquer le loading
    function hideLoading() {
        isSubmitting = false; // Réinitialiser le flag
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
        }
        if (loadingOverlay) {
            loadingOverlay.classList.remove('show');
        }
    }

    // Auto-focus sur le premier champ
    document.addEventListener('DOMContentLoaded', function() {
        const usernameInput = document.getElementById('username');
        if (usernameInput && !usernameInput.value) {
            usernameInput.focus();
        }
    });

    // Validation en temps réel
    document.addEventListener('DOMContentLoaded', function() {
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        // Validation de l'email en temps réel
        usernameInput.addEventListener('input', function() {
            this.classList.remove('is-invalid', 'is-valid');
            emailError.style.display = 'none';
        });

        usernameInput.addEventListener('blur', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (this.value.trim() && emailRegex.test(this.value)) {
                this.classList.add('is-valid');
                this.classList.remove('is-invalid');
                emailError.style.display = 'none';
            } else if (this.value.trim()) {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
                emailError.textContent = 'Veuillez entrer une adresse email valide';
                emailError.style.display = 'block';
            }
        });

        // Validation du mot de passe en temps réel
        passwordInput.addEventListener('input', function() {
            this.classList.remove('is-invalid', 'is-valid');
            passwordError.style.display = 'none';
        });

        passwordInput.addEventListener('blur', function() {
            if (this.value.trim() && this.value.length >= 6) {
                this.classList.add('is-valid');
                this.classList.remove('is-invalid');
                passwordError.style.display = 'none';
            } else if (this.value.trim()) {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                passwordError.style.display = 'block';
            }
        });

        // Permettre la soumission avec Enter
        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    });
</script>
</body>
</html>
