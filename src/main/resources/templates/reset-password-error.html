<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeSchedule - Lien de réinitialisation invalide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth-professional.css">
</head>
<body>
    <div class="auth-container fade-in">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <div class="auth-header" style="margin-bottom: 1rem;">
            <h1 class="auth-title" style="color: var(--danger-color);">Lien de réinitialisation invalide</h1>
            <p class="auth-subtitle">Le lien que vous avez utilisé n'est plus valide ou a expiré.</p>
        </div>

        <div class="alert alert-danger">
            <span class="alert-icon"><i class="fas fa-exclamation-circle"></i></span>
            <strong>Lien de réinitialisation invalide</strong><br>
            Ce lien n'est plus valide. Veuillez demander un nouveau lien de réinitialisation.
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="/reset-password-request" class="btn btn-primary btn-full">
                <i class="fas fa-redo"></i> Demander un nouveau lien
            </a>
            <a href="/login" class="btn btn-secondary btn-full">
                <i class="fas fa-arrow-left"></i> Retour à la connexion
            </a>
        </div>
    </div>
</body>
</html>
