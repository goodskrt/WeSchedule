<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeSchedule - Demande de réinitialisation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth-professional.css">
</head>
<body>
    <div class="auth-container fade-in">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="/images/logo.jpeg" alt="WeSchedule Logo">
            </div>
            <h1 class="auth-title">WeSchedule</h1>
            <p class="auth-subtitle">Réinitialisation de votre mot de passe</p>
        </div>

        <div id="message" class="alert" style="display: none;"></div>

        <div class="info-box">
            <i class="info-box-icon fas fa-info-circle"></i>
            Veuillez entrer votre adresse email associée à votre compte. 
            Un code de réinitialisation vous sera envoyé par email.
        </div>

        <form id="forgotPasswordForm" class="auth-form">
            <div class="form-group">
                <label for="email" class="form-label">Adresse email</label>
                <div class="input-group">
                    <i class="input-icon fas fa-envelope"></i>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Entrez votre email"
                        autocomplete="email"
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Envoyer le code
            </button>
        </form>

        <div class="divider">ou</div>

        <a href="/login" class="auth-link-muted">
            <i class="fas fa-arrow-left"></i> Retour à la connexion
        </a>
    </div>

    <script>
        // Form handling
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await sendResetLink();
        });

        async function sendResetLink() {
            const email = emailInput.value.trim();

            if (!email) {
                showMessage('Veuillez entrer votre email', 'danger');
                return;
            }

            if (!isValidEmail(email)) {
                showMessage('Veuillez entrer un email valide', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Envoi en cours...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error('HTTP Error:', response.status, text);
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    showMessage('Un code de réinitialisation a été envoyé à votre email. Veuillez vérifier votre boîte de réception.', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showMessage(data.message || 'Une erreur s\'est produite. Veuillez réessayer.', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer le code';
                }
            } catch (error) {
                console.error('Erreur complète:', error);
                showMessage('Erreur lors de la communication avec le serveur: ' + error.message, 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer le code';
            }
        }

        function showMessage(message, type) {
            messageDiv.className = `alert alert-${type}`;
            messageDiv.innerHTML = `
                <span class="alert-icon"><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i></span>
                ${message}
            `;
            messageDiv.style.display = 'block';
        }

        function isValidEmail(email) {
            const emailRegex = /^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
