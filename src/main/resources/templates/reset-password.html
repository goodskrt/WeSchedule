<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeSchedule - Réinitialisation du mot de passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth-professional.css">
</head>
<body>
    <div class="auth-container fade-in">
        <div class="auth-header">
            <h1 class="auth-title">WeSchedule</h1>
            <p class="auth-subtitle">Réinitialisation de votre mot de passe</p>
        </div>

        <div id="reset-message" class="alert" style="display: none;"></div>

        <form id="resetForm" th:if="${token != null}" class="auth-form">
            <input type="hidden" id="resetToken" th:value="${token}">
            <input type="hidden" id="currentPasswordHash" th:value="${currentPasswordHash}">

            <div class="form-group">
                <label for="newPassword" class="form-label">Nouveau mot de passe</label>
                <div class="input-group">
                    <i class="input-icon fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="Au moins 8 caractères, différent de l'ancien"
                    >
                    <button type="button" class="input-toggle" onclick="togglePasswordVisibility('newPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="password-requirements">
                    <div class="requirement-item">
                        <div class="requirement-icon" id="req-length">
                            <i class="fas fa-check" style="display:none;"></i>
                        </div>
                        <span id="req-length-text">Minimum 8 caractères</span>
                    </div>
                    <div class="requirement-item">
                        <div class="requirement-icon" id="req-different">
                            <i class="fas fa-check" style="display:none;"></i>
                        </div>
                        <span id="req-different-text">Différent de l'ancien mot de passe</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirmez le mot de passe</label>
                <div class="input-group">
                    <i class="input-icon fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="Confirmez votre mot de passe"
                    >
                    <button type="button" class="input-toggle" onclick="togglePasswordVisibility('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="password-requirements">
                    <div class="requirement-item">
                        <div class="requirement-icon" id="req-match">
                            <i class="fas fa-check" style="display:none;"></i>
                        </div>
                        <span id="req-match-text">Les mots de passe correspondent</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-full" id="submitBtn">
                <i class="fas fa-check"></i> Réinitialiser le mot de passe
            </button>
        </form>

        <div th:if="${token == null}" class="alert alert-danger">
            <span class="alert-icon"><i class="fas fa-exclamation-circle"></i></span>
            Lien de réinitialisation invalide ou expiré
        </div>

        <div class="divider">ou</div>

        <a href="/login" class="auth-link-muted">
            <i class="fas fa-arrow-left"></i> Retour à la connexion
        </a>
    </div>

    <script>
        // Form handling
        const form = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('reset-message');

        if (form) {
            newPasswordInput.addEventListener('input', validatePassword);
            confirmPasswordInput.addEventListener('input', validatePassword);
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                await resetPassword();
            });
        }

        function validatePassword() {
            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            const lengthValid = password.length >= 8;
            updateRequirement('req-length', lengthValid);

            const matchValid = password === confirmPassword && password.length > 0;
            updateRequirement('req-match', matchValid);

            // Valider que le nouveau mot de passe est différent de l'ancien
            if (password.length >= 8) {
                validateDifferentPassword(password);
            } else {
                updateRequirement('req-different', false);
            }

            // Le bouton n'est activé que si toutes les validations passent
            const differentValid = document.getElementById('req-different').classList.contains('valid');
            submitBtn.disabled = !(lengthValid && matchValid && differentValid);
        }

        async function validateDifferentPassword(newPassword) {
            const currentHash = document.getElementById('currentPasswordHash').value;
            
            if (!currentHash || !newPassword) {
                updateRequirement('req-different', false);
                return;
            }

            try {
                const response = await fetch('/api/validate-new-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentHash: currentHash,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();
                updateRequirement('req-different', data.success);
            } catch (error) {
                console.error('Erreur validation mot de passe:', error);
                updateRequirement('req-different', true); // En cas d'erreur, on laisse passer
            }
        }

        function updateRequirement(id, isValid) {
            const icon = document.querySelector(`#${id} i`);
            const element = document.getElementById(id);
            if (isValid) {
                element.classList.add('valid');
                icon.style.display = 'inline';
            } else {
                element.classList.remove('valid');
                icon.style.display = 'none';
            }
        }

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = event.target.closest('.input-toggle');
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function resetPassword() {
            const token = document.getElementById('resetToken').value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!token) {
                showMessage('Lien invalide', 'danger');
                return;
            }

            if (newPassword.length < 8) {
                showMessage('Le mot de passe doit contenir au moins 8 caractères', 'danger');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Réinitialisation...';

            try {
                const response = await fetch('/api/reset-password-with-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    })
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error('HTTP Error:', response.status, text);
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    if (data.message === "RESET_AND_LOGIN_SUCCESS") {
                        // Connexion automatique réussie, redirection vers page de succès avec animation
                        const email = data.email;
                        const role = data.role;
                        const successUrl = `/reset-password-success?email=${encodeURIComponent(email)}&role=${encodeURIComponent(role)}&autoLogin=true`;
                        window.location.href = successUrl;
                    } else {
                        // Redirection vers la page de succès (fallback)
                        const email = data.email;
                        const successUrl = `/reset-password-success?email=${encodeURIComponent(email)}`;
                        window.location.href = successUrl;
                    }
                } else {
                    showMessage(data.message || 'Erreur lors de la réinitialisation', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Réinitialiser le mot de passe';
                }
            } catch (error) {
                console.error('Erreur complète:', error);
                showMessage('Erreur lors de la communication avec le serveur: ' + error.message, 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Réinitialiser le mot de passe';
            }
        }

        function showMessage(message, type) {
            messageDiv.className = `alert alert-${type}`;
            messageDiv.innerHTML = `
                <span class="alert-icon"><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i></span>
                ${message}
            `;
            messageDiv.style.display = 'block';
        }

        if (form) {
            validatePassword();
        }
    </script>
</body>
</html>
